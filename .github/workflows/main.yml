name: Android CI Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: check structure
        run: ls -R

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: find n build
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "No such file"
            exit 1
          fi
          
          DIR=$(dirname "$GRADLEW_PATH")
          echo "file at: $DIR"
          
          chmod +x "$GRADLEW_PATH"
          cd "$DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GDVN-App-Debug
          path: "**/build/outputs/apk/debug/*.apk"
          
